services:
  - type: web
    name: halal-exness-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: METAAPI_TOKEN
        value: YOUR_METAAPI_TOKEN_HERE
        sync: false
    disk:
      name: halal-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    healthCheckPath: /api/health
    autoDeploy: true
